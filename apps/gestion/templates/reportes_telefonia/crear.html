{% extends 'base.html' %}

{% block title %}Crear Reporte Telefónico{% endblock %}

{% block content %}

<div class="container-fluid mt-4">

    <h1 class="text-2xl font-bold mb-6">Crear Reporte Telefónico</h1>

    <form method="post" class="bg-white shadow-md rounded px-8 pt-6 pb-8 mb-4">
        {% csrf_token %}

        {% for field in form %}
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">
                    {{ field.label }}
                </label>

                {{ field }}

                {% if field.errors %}
                    <p class="text-red-500 text-xs mt-1">
                        {{ field.errors.0 }}
                    </p>
                {% endif %}
            </div>
        {% endfor %}

        <!-- Botones -->
        <div class="flex items-center justify-between">
            <button type="submit" class="btn btn-primary">
                Guardar
            </button>
            <a href="{% url 'reportes' %}" class="text-sm text-gray-600 hover:underline">
                Cancelar
            </a>
        </div>
    </form>

</div>
{% endblock %}
